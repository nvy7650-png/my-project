<!DOCTYPE html>
<html>
<head>
<title>Users List</title>
</head>

<body>

<h1>Users List</h1>
<ul id="users"></ul>

<script>
fetch("https://webdatlichlamtoc.id.vn/api/users")
.then(res => res.json())
.then(data => {

  const users = data.data_users
  const list = document.getElementById("users")

  users.forEach(user => {
    const li = document.createElement("li")
    li.innerText = user.id + " - " + user.name
    list.appendChild(li)
  })

})
</script>

</body>
</html>
